<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARSEC Cyber Range — CTF Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #060a10;
      --bg-base: #0a0f18;
      --bg-card: #0d1520;
      --bg-card-hover: #111b2a;
      --bg-elevated: #141e2e;
      --border: rgba(0, 229, 255, 0.08);
      --border-bright: rgba(0, 229, 255, 0.2);
      --text: #d0d8e0;
      --text-dim: rgba(255, 255, 255, 0.4);
      --text-muted: rgba(255, 255, 255, 0.25);
      --cyan: #00e5ff;
      --cyan-dim: #00b8d4;
      --green: #34d399;
      --red: #f43f5e;
      --amber: #fbbf24;
      --orange: #f97316;
      --purple: #a78bfa;
      --rose: #f43f5e;
      --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --sans: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.12); border-radius: 3px; }

    /* ═══ Background ═══ */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(0,229,255,0.012) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(0,229,255,0.012) 80px);
    }
    .bg-radial {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 800px 600px at 50% 0%, rgba(0,229,255,0.03) 0%, transparent 70%);
    }

    /* ═══ Header ═══ */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,10,16,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; height: 60px;
      gap: 2rem;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; cursor: pointer; flex-shrink: 0;
    }
    .logo-icon { font-size: 20px; }
    .logo-text {
      font-family: var(--mono); font-weight: 700; font-size: 15px;
      letter-spacing: 3px; color: var(--cyan);
    }
    .logo-sub {
      font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
      color: var(--text-muted); margin-left: 6px;
    }
    .nav-tabs {
      display: flex; gap: 4px; margin-left: 2rem;
    }
    .nav-tab {
      font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
      padding: 8px 16px; border-radius: 6px;
      background: transparent; border: 1px solid transparent;
      color: var(--text-dim); cursor: pointer;
      transition: all 0.2s;
    }
    .nav-tab:hover { color: var(--text); border-color: var(--border); }
    .nav-tab.active {
      background: rgba(0,229,255,0.08);
      border-color: rgba(0,229,255,0.2);
      color: var(--cyan);
    }
    .header-right {
      margin-left: auto; display: flex; align-items: center; gap: 16px;
    }
    .team-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 8px;
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.12);
    }
    .team-badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    .team-badge-name {
      font-family: var(--mono); font-size: 12px; color: var(--text);
    }
    .btn-logout {
      font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
      padding: 6px 14px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* ═══ Main ═══ */
    .main { max-width: 1280px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

    /* ═══ Auth ═══ */
    .auth-wrapper {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; position: relative; z-index: 1;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-bright);
      border-radius: 16px; padding: 2.5rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 60px rgba(0,229,255,0.03);
    }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header .logo-icon { font-size: 28px; display: block; margin-bottom: 12px; }
    .auth-header .logo-text { font-size: 20px; letter-spacing: 4px; display: block; }
    .auth-header .logo-sub { display: block; margin-top: 4px; font-size: 10px; margin-left: 0; }
    .auth-tabs {
      display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem;
    }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center;
      font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
    }
    .auth-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; margin-bottom: 6px;
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--mono); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--cyan); }
    .form-input::placeholder { color: var(--text-muted); }
    .btn-primary {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-dim));
      border: none; border-radius: 8px;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      letter-spacing: 2px; color: #000; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-error {
      margin-top: 10px; padding: 10px; border-radius: 6px;
      background: rgba(244,63,94,0.08); border: 1px solid rgba(244,63,94,0.2);
      font-family: var(--mono); font-size: 12px; color: var(--red);
      text-align: center; display: none;
    }
    .auth-error.show { display: block; animation: shake 0.4s ease; }
    .auth-footer {
      margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
      text-align: center;
    }
    .auth-admin-link {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
      color: var(--text-muted); text-decoration: none; cursor: pointer;
      transition: color 0.2s;
    }
    .auth-admin-link:hover { color: var(--text-dim); }

    /* ═══ Stats bar ═══ */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 2rem;
    }
    .stat-card {
      padding: 16px 18px; text-align: center;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px;
    }
    .stat-value {
      font-family: var(--mono); font-size: 24px; font-weight: 700;
      margin-bottom: 2px;
    }
    .stat-label {
      font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
      color: var(--text-muted); text-transform: uppercase;
    }

    /* ═══ Kill chain ═══ */
    .killchain {
      position: relative; margin-bottom: 2rem;
      padding: 0 16px;
    }
    .killchain-line {
      position: absolute; top: 17px; left: 40px; right: 40px; height: 2px;
      background: rgba(255,255,255,0.04);
    }
    .killchain-progress {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      box-shadow: 0 0 12px rgba(0,229,255,0.2);
      transition: width 0.6s ease;
    }
    .killchain-nodes {
      display: flex; justify-content: space-between; position: relative;
    }
    .killchain-node {
      display: flex; flex-direction: column; align-items: center; width: 36px;
    }
    .killchain-dot {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      transition: all 0.3s;
    }
    .killchain-dot.pending {
      background: var(--bg-card); border: 2px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
    }
    .killchain-dot.active {
      background: var(--bg-card); border: 2px solid var(--cyan);
      color: var(--cyan);
    }
    .killchain-dot.solved {
      background: var(--green); border: 2px solid var(--green);
      color: #000;
    }
    .killchain-label {
      font-family: var(--mono); font-size: 8px; letter-spacing: 1px;
      color: var(--text-muted); margin-top: 6px; text-align: center;
      max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ═══ Section header ═══ */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-family: var(--mono); font-size: 11px; letter-spacing: 3px;
      color: rgba(0,229,255,0.5); text-transform: uppercase;
    }
    .category-filters { display: flex; gap: 5px; flex-wrap: wrap; }
    .cat-btn {
      font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
      padding: 5px 12px; border-radius: 4px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      text-transform: uppercase;
    }
    .cat-btn:hover { border-color: var(--border-bright); color: var(--text-dim); }
    .cat-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.05); }

    /* ═══ Challenge cards ═══ */
    .challenges-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;
    }
    .challenge-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 22px;
      transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden;
    }
    .challenge-card:hover {
      border-color: var(--border-bright); transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,229,255,0.05);
    }
    .challenge-card.solved {
      border-color: rgba(52,211,153,0.25);
      background: rgba(52,211,153,0.03);
    }
    .challenge-card.solved .ch-solved-badge {
      display: flex;
    }
    .ch-solved-badge {
      display: none; position: absolute; top: 0; right: 0;
      background: var(--green); color: #000;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 1px; padding: 4px 12px;
      border-bottom-left-radius: 8px;
    }
    .ch-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 8px;
    }
    .ch-title-row { display: flex; align-items: center; gap: 8px; }
    .ch-icon { font-size: 18px; }
    .ch-title {
      font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text);
    }
    .ch-points {
      font-family: var(--mono); font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .ch-cat {
      display: inline-block; font-family: var(--mono);
      font-size: 9px; letter-spacing: 2px; font-weight: 700;
      padding: 3px 10px; border-radius: 4px;
      margin-bottom: 10px;
    }
    .ch-desc {
      font-size: 13px; color: var(--text-dim); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Category colors */
    .cat-recon { color: #00e5ff; background: rgba(0,229,255,0.1); }
    .cat-intrusion { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .cat-forensics { color: #a78bfa; background: rgba(167,139,250,0.1); }
    .cat-sigint { color: #fbbf24; background: rgba(251,191,36,0.1); }
    .cat-privesc { color: #f97316; background: rgba(249,115,22,0.1); }
    .cat-persistence { color: #34d399; background: rgba(52,211,153,0.1); }
    .cat-crypto { color: #f43f5e; background: rgba(244,63,94,0.1); }
    .cat-web { color: #3b82f6; background: rgba(59,130,246,0.1); }
    .cat-pwn { color: #f97316; background: rgba(249,115,22,0.1); }
    .cat-reversing { color: #f59e0b; background: rgba(245,158,11,0.1); }

    /* ═══ Modal ═══ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; }
    .modal {
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-deep) 100%);
      border: 1px solid var(--border-bright); border-radius: 16px;
      padding: 2rem; width: 100%; max-width: 560px; position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; color: var(--text-muted);
      font-size: 20px; cursor: pointer; transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-title {
      font-family: var(--mono); font-size: 18px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .modal-cat {
      font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
      font-weight: 700; margin-bottom: 12px; display: inline-block;
      padding: 3px 10px; border-radius: 4px;
    }
    .modal-desc {
      font-size: 13px; color: var(--text-dim); line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .modal-divider {
      height: 1px; margin: 1rem 0;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
    }
    .flag-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .flag-input {
      flex: 1; padding: 12px 14px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--mono); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .flag-input:focus { border-color: var(--cyan); }
    .flag-input::placeholder { color: var(--text-muted); }
    .flag-input.error { border-color: var(--red); }
    .btn-submit {
      padding: 12px 20px; border: none; border-radius: 8px;
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
      text-transform: uppercase;
    }
    .btn-submit.primary {
      background: linear-gradient(135deg, var(--cyan), var(--cyan-dim));
      color: #000;
    }
    .btn-submit.primary:hover { filter: brightness(1.1); }
    .flag-error {
      font-family: var(--mono); font-size: 11px; color: var(--red);
      margin-bottom: 10px; display: none;
    }
    .flag-error.show { display: block; }
    .flag-success {
      font-family: var(--mono); font-size: 11px; color: var(--green);
      margin-bottom: 10px; display: none;
    }
    .flag-success.show { display: block; }

    /* Hints in modal */
    .hints-section { margin-top: 1rem; }
    .hint-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .btn-hint {
      font-family: var(--mono); font-size: 11px;
      padding: 8px 14px; border-radius: 6px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
    }
    .btn-hint:hover:not(.unlocked):not(:disabled) {
      border-color: var(--amber); color: var(--amber);
    }
    .btn-hint.unlocked {
      background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3);
      color: var(--amber); cursor: default;
    }
    .btn-hint:disabled { opacity: 0.3; cursor: not-allowed; }
    .hint-text-box {
      margin-top: 8px; padding: 10px 14px; border-radius: 6px;
      background: rgba(251,191,36,0.04); border: 1px solid rgba(251,191,36,0.12);
      font-family: var(--mono); font-size: 12px; color: var(--amber);
    }

    /* ═══ Scoreboard ═══ */
    .scoreboard-table {
      width: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; border-collapse: separate; border-spacing: 0;
    }
    .scoreboard-table th {
      font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
      color: var(--text-muted); text-transform: uppercase;
      padding: 14px 20px; text-align: left;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .scoreboard-table td {
      font-family: var(--mono); padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 13px;
    }
    .scoreboard-table tr:last-child td { border-bottom: none; }
    .scoreboard-table tbody tr {
      transition: background 0.2s; cursor: pointer;
    }
    .scoreboard-table tbody tr:hover { background: rgba(0,229,255,0.02); }
    .rank-1 { color: #fbbf24; font-weight: 700; font-size: 16px; }
    .rank-2 { color: #94a3b8; font-weight: 700; }
    .rank-3 { color: #cd7f32; font-weight: 700; }
    .team-name-cell { font-weight: 600; color: var(--text); }
    .points-cell { color: var(--green); font-weight: 700; }

    /* ═══ Admin ═══ */
    .admin-section {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden;
    }
    .admin-section-head {
      padding: 14px 20px; background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .admin-section-head h3 {
      font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .admin-body { padding: 20px; }
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .form-grid .full { grid-column: 1 / -1; }
    .form-textarea {
      width: 100%; padding: 12px 14px; min-height: 80px; resize: vertical;
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--sans); font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .form-textarea:focus { border-color: var(--cyan); }
    .form-select {
      width: 100%; padding: 12px 14px;
      background: var(--bg-deep); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--mono); font-size: 13px;
      outline: none; cursor: pointer;
    }
    .btn-danger {
      font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
      padding: 8px 14px; border-radius: 6px;
      background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3);
      color: var(--red); cursor: pointer; transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(244,63,94,0.2); }
    .btn-sm {
      font-family: var(--mono); font-size: 10px; padding: 5px 10px;
      border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn-sm.danger { border-color: rgba(244,63,94,0.3); color: var(--red); }
    .btn-sm.danger:hover { background: rgba(244,63,94,0.1); }

    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
      color: var(--text-muted); text-align: left; padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 10px 14px; font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .admin-table tr:last-child td { border-bottom: none; }

    /* ═══ Toast ═══ */
    .toast-container {
      position: fixed; top: 80px; right: 20px; z-index: 2000;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 18px; border-radius: 8px;
      font-family: var(--mono); font-size: 12px;
      display: flex; align-items: center; gap: 8px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.success {
      background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3);
      color: var(--green);
    }
    .toast.error {
      background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.3);
      color: var(--red);
    }

    /* ═══ Empty state ═══ */
    .empty-state {
      text-align: center; padding: 3rem;
      color: var(--text-muted); font-family: var(--mono); font-size: 13px;
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; height: auto; padding: 10px 0; }
      .nav-tabs { margin-left: 0; order: 3; width: 100%; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .challenges-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .killchain-label { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-radial"></div>
  <div id="app"></div>
  <div class="toast-container" id="toasts"></div>

  <script>
    // ═══════════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════════
    const state = {
      user: null,
      teamId: null,
      isAdmin: false,
      page: 'challenges',
      authMode: 'login',
      challenges: [],
      scoreboard: [],
      adminChallenges: [],
      adminTeams: [],
      selectedCat: 'all',
      modalChallenge: null,
      loading: false,
    };

    // Category metadata
    const CAT_META = {
      RECON:        { icon: '🔍', color: '#00e5ff', class: 'cat-recon' },
      INTRUSION:    { icon: '🔓', color: '#ff6b6b', class: 'cat-intrusion' },
      FORENSICS:    { icon: '🔬', color: '#a78bfa', class: 'cat-forensics' },
      Forensics:    { icon: '🔬', color: '#a78bfa', class: 'cat-forensics' },
      SIGINT:       { icon: '📡', color: '#fbbf24', class: 'cat-sigint' },
      PRIVESC:      { icon: '⬆️', color: '#f97316', class: 'cat-privesc' },
      PERSISTENCE:  { icon: '👁️', color: '#34d399', class: 'cat-persistence' },
      CRYPTO:       { icon: '🏴‍☠️', color: '#f43f5e', class: 'cat-crypto' },
      Crypto:       { icon: '🏴‍☠️', color: '#f43f5e', class: 'cat-crypto' },
      Web:          { icon: '🌐', color: '#3b82f6', class: 'cat-web' },
      Pwn:          { icon: '💥', color: '#f97316', class: 'cat-pwn' },
      Reversing:    { icon: '🔧', color: '#f59e0b', class: 'cat-reversing' },
    };

    const getCatMeta = (cat) => CAT_META[cat] || { icon: '🎯', color: '#00e5ff', class: 'cat-recon' };
    const HINT_MULT = [1, 0.75, 0.5, 0.3];
    const calcPoints = (base, hints) => Math.floor(base * HINT_MULT[Math.min(hints, 3)]);

    // ═══════════════════════════════════════════════════════
    //  API
    // ═══════════════════════════════════════════════════════
    const api = {
      async request(method, url, data) {
        const opts = { method, headers: {} };
        if (data) {
          opts.headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(data);
        }
        const res = await fetch(url, opts);
        const json = await res.json();
        if (!res.ok && !json.error) json.error = `Error ${res.status}`;
        return json;
      },
      get: (url) => api.request('GET', url),
      post: (url, data) => api.request('POST', url, data),
      put: (url, data) => api.request('PUT', url, data),
      del: (url) => api.request('DELETE', url),
    };

    // ═══════════════════════════════════════════════════════
    //  TOAST
    // ═══════════════════════════════════════════════════════
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> <span>${msg}</span>`;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // ═══════════════════════════════════════════════════════
    //  RENDER ENGINE
    // ═══════════════════════════════════════════════════════
    function render() {
      const app = document.getElementById('app');

      if (!state.user) {
        app.innerHTML = renderAuth();
        bindAuth();
        return;
      }

      let content = '';
      switch (state.page) {
        case 'challenges': content = renderChallenges(); break;
        case 'scoreboard': content = renderScoreboard(); break;
        case 'admin': content = state.isAdmin ? renderAdmin() : renderChallenges(); break;
        default: content = renderChallenges();
      }

      app.innerHTML = renderHeader() + `<div class="main">${content}</div>`;
      bindPage();
    }

    // ═══════════════════════════════════════════════════════
    //  AUTH SCREEN
    // ═══════════════════════════════════════════════════════
    function renderAuth() {
      const isLogin = state.authMode === 'login';
      return `
        <div class="auth-wrapper">
          <div class="auth-card">
            <div class="auth-header">
              <span class="logo-icon">⚓</span>
              <span class="logo-text">MARSEC</span>
              <span class="logo-sub">CYBER RANGE 2026</span>
            </div>
            <div class="auth-tabs">
              <button class="auth-tab ${isLogin ? 'active' : ''}" data-tab="login">Iniciar Sesión</button>
              <button class="auth-tab ${!isLogin ? 'active' : ''}" data-tab="register">Registrar Equipo</button>
            </div>
            <form id="auth-form">
              <div class="form-group">
                <label class="form-label">Nombre de equipo</label>
                <input class="form-input" type="text" id="auth-name" placeholder="Ej: Red Phoenix" required autocomplete="off" maxlength="30">
              </div>
              <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input class="form-input" type="password" id="auth-pass" required>
              </div>
              <button type="submit" class="btn-primary" id="auth-btn">
                ${isLogin ? 'ENTRAR' : 'REGISTRAR EQUIPO'}
              </button>
              <div class="auth-error" id="auth-error"></div>
            </form>
            <div class="auth-footer">
              <a class="auth-admin-link" id="admin-link">⚙ Acceso administrador</a>
            </div>
          </div>
        </div>
      `;
    }

    function bindAuth() {
      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          state.authMode = tab.dataset.tab;
          render();
        });
      });

      document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('auth-name').value.trim();
        const password = document.getElementById('auth-pass').value;
        const errorEl = document.getElementById('auth-error');
        const btn = document.getElementById('auth-btn');

        errorEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'CONECTANDO...';

        try {
          const endpoint = state.authMode === 'login' ? '/api/login' : '/api/register';
          const result = await api.post(endpoint, { name, password });

          if (result.error) {
            errorEl.textContent = result.error;
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = state.authMode === 'login' ? 'ENTRAR' : 'REGISTRAR EQUIPO';
          } else {
            state.user = result.teamName;
            state.teamId = result.teamId;
            await loadChallenges();
            render();
          }
        } catch (err) {
          errorEl.textContent = 'Error de conexión con el servidor';
          errorEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = state.authMode === 'login' ? 'ENTRAR' : 'REGISTRAR EQUIPO';
        }
      });

      document.getElementById('admin-link').addEventListener('click', (e) => {
        e.preventDefault();
        showAdminLoginModal();
      });
    }

    // ═══════════════════════════════════════════════════════
    //  HEADER
    // ═══════════════════════════════════════════════════════
    function renderHeader() {
      const tabs = [
        { key: 'challenges', label: 'Retos' },
        { key: 'scoreboard', label: 'Clasificación' },
      ];
      if (state.isAdmin) tabs.push({ key: 'admin', label: 'Admin' });

      return `
        <div class="header">
          <div class="header-inner">
            <div class="logo" onclick="navigate('challenges')">
              <span class="logo-icon">⚓</span>
              <span class="logo-text">MARSEC</span>
              <span class="logo-sub">CYBER RANGE</span>
            </div>
            <div class="nav-tabs">
              ${tabs.map(t => `
                <button class="nav-tab ${state.page === t.key ? 'active' : ''}"
                  onclick="navigate('${t.key}')">${t.label}</button>
              `).join('')}
            </div>
            <div class="header-right">
              <div class="team-badge">
                <div class="team-badge-dot"></div>
                <span class="team-badge-name">${escHtml(state.user)}</span>
              </div>
              <button class="btn-logout" onclick="logout()">SALIR</button>
            </div>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════════════════
    //  CHALLENGES VIEW
    // ═══════════════════════════════════════════════════════
    function renderChallenges() {
      const cats = ['all', ...new Set(state.challenges.map(c => c.category))];
      const filtered = state.selectedCat === 'all'
        ? state.challenges
        : state.challenges.filter(c => c.category === state.selectedCat);

      const solved = state.challenges.filter(c => c.solved).length;
      const total = state.challenges.length;
      const pts = state.challenges.filter(c => c.solved).reduce((s, c) => s + calcPoints(c.points, c.hintsUsed || 0), 0);
      const maxPts = state.challenges.reduce((s, c) => s + c.points, 0);

      // Find team rank
      const myRank = state.scoreboard.find(t => t.id === state.teamId);

      return `
        <div class="stats-bar" style="animation: fadeUp 0.4s ease">
          <div class="stat-card">
            <div class="stat-value" style="color:var(--cyan)">${solved}/${total}</div>
            <div class="stat-label">Retos Resueltos</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--green)">${pts.toLocaleString()}</div>
            <div class="stat-label">Puntuación</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--amber)">${myRank ? '#' + myRank.rank : '-'}</div>
            <div class="stat-label">Posición</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--text-dim)">${maxPts.toLocaleString()}</div>
            <div class="stat-label">Puntos Posibles</div>
          </div>
        </div>

        ${renderKillChain()}

        <div class="section-header">
          <span class="section-title">Misiones Operativas</span>
          <div class="category-filters">
            ${cats.map(c => `
              <button class="cat-btn ${state.selectedCat === c ? 'active' : ''}"
                onclick="filterCat('${c}')">
                ${c === 'all' ? 'Todos' : c}
              </button>
            `).join('')}
          </div>
        </div>

        <div class="challenges-grid">
          ${filtered.map((ch, i) => renderChallengeCard(ch, i)).join('')}
        </div>
      `;
    }

    function renderKillChain() {
      const solved = state.challenges.filter(c => c.solved).length;
      const total = state.challenges.length;
      const pct = total > 0 ? (solved / total) * 100 : 0;

      return `
        <div class="killchain">
          <div class="killchain-line">
            <div class="killchain-progress" style="width:${pct}%"></div>
          </div>
          <div class="killchain-nodes">
            ${state.challenges.map((ch, i) => {
              const meta = getCatMeta(ch.category);
              const status = ch.solved ? 'solved' : (i === 0 || state.challenges[i-1]?.solved) ? 'active' : 'pending';
              return `
                <div class="killchain-node">
                  <div class="killchain-dot ${status}" title="${ch.title}">
                    ${ch.solved ? '✓' : (i + 1)}
                  </div>
                  <span class="killchain-label">${ch.category}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderChallengeCard(ch, i) {
      const meta = getCatMeta(ch.category);
      return `
        <div class="challenge-card ${ch.solved ? 'solved' : ''}"
          onclick="openChallenge('${ch.id}')"
          style="animation: fadeUp 0.4s ease ${i * 0.06}s both">
          <div class="ch-solved-badge">✓ RESUELTO</div>
          <div class="ch-header">
            <div class="ch-title-row">
              <span class="ch-icon">${meta.icon}</span>
              <span class="ch-title">${escHtml(ch.title)}</span>
            </div>
            <span class="ch-points" style="color:${ch.solved ? 'var(--green)' : meta.color}">${ch.points}</span>
          </div>
          <span class="ch-cat ${meta.class}">${ch.category}</span>
          <p class="ch-desc">${escHtml(ch.description)}</p>
        </div>
      `;
    }

    // ═══════════════════════════════════════════════════════
    //  CHALLENGE MODAL
    // ═══════════════════════════════════════════════════════
    function openChallenge(id) {
      const ch = state.challenges.find(c => c.id === id);
      if (!ch) return;
      state.modalChallenge = ch;

      const meta = getCatMeta(ch.category);
      const hintsUsed = ch.unlockedHints?.length || 0;
      const currentMax = calcPoints(ch.points, hintsUsed);

      let hintsHtml = '';
      if (!ch.solved) {
        hintsHtml = '<div class="hints-section">';
        for (let n = 1; n <= 3; n++) {
          const unlocked = ch.unlockedHints?.includes(n);
          const hintText = ch[`hint${n}`];
          const canUnlock = n === 1 || ch.unlockedHints?.includes(n - 1);

          hintsHtml += `
            <div class="hint-row">
              <button class="btn-hint ${unlocked ? 'unlocked' : ''}"
                ${unlocked || !canUnlock ? '' : `onclick="unlockHint('${ch.id}', ${n})"`}
                ${!canUnlock && !unlocked ? 'disabled' : ''}>
                💡 Pista ${n} ${unlocked ? '(desbloqueada)' : `(-${25 * n}%)`}
              </button>
            </div>
            ${unlocked && hintText ? `<div class="hint-text-box">💡 ${escHtml(hintText)}</div>` : ''}
          `;
        }
        hintsHtml += '</div>';
      }

      const content = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
          <div>
            <span class="modal-cat ${meta.class}">${ch.category}</span>
            <div class="modal-title">${escHtml(ch.title)}</div>
          </div>
          <span style="font-family:var(--mono);font-size:24px;font-weight:700;color:${ch.solved ? 'var(--green)' : meta.color}">${ch.points}</span>
        </div>
        <div class="modal-divider"></div>
        <p class="modal-desc">${escHtml(ch.description)}</p>

        ${ch.solved ? `
          <div style="padding:14px;border-radius:8px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);text-align:center">
            <span style="font-family:var(--mono);font-size:13px;color:var(--green)">
              ✓ Reto completado${ch.hintsUsed > 0 ? ` (${ch.hintsUsed} pista${ch.hintsUsed > 1 ? 's' : ''} usada${ch.hintsUsed > 1 ? 's' : ''})` : ''}
            </span>
          </div>
        ` : `
          <div class="flag-input-row">
            <input class="flag-input" id="modal-flag" placeholder="MARSEC{...}" autocomplete="off">
            <button class="btn-submit primary" onclick="submitFlag('${ch.id}')">ENVIAR</button>
          </div>
          <div class="flag-error" id="modal-flag-error"></div>
          <div class="flag-success" id="modal-flag-success"></div>

          ${hintsUsed > 0 ? `
            <div style="font-family:var(--mono);font-size:11px;color:var(--amber);margin-bottom:8px">
              Puntos máximos con pistas: ${currentMax}
            </div>
          ` : ''}

          ${hintsHtml}
        `}
      `;

      showModal(content);

      // Focus flag input
      setTimeout(() => {
        const input = document.getElementById('modal-flag');
        if (input) {
          input.focus();
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitFlag(ch.id);
          });
        }
      }, 100);
    }

    // ═══════════════════════════════════════════════════════
    //  SCOREBOARD VIEW
    // ═══════════════════════════════════════════════════════
    function renderScoreboard() {
      return `
        <div class="section-header">
          <span class="section-title">Clasificación en Tiempo Real</span>
          <button class="cat-btn" onclick="loadScoreboard()">↻ Actualizar</button>
        </div>

        ${state.scoreboard.length === 0 ? `
          <div class="empty-state">No hay equipos registrados todavía</div>
        ` : `
          <table class="scoreboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Equipo</th>
                <th>Puntos</th>
                <th>Retos</th>
                <th>Última Flag</th>
              </tr>
            </thead>
            <tbody>
              ${state.scoreboard.map(t => `
                <tr onclick="showTeamHistory('${t.id}', '${escAttr(t.name)}')">
                  <td class="${t.rank <= 3 ? 'rank-' + t.rank : ''}">${t.rank === 1 ? '👑' : '#'}${t.rank}</td>
                  <td class="team-name-cell">${escHtml(t.name)}</td>
                  <td class="points-cell">${t.total_points.toLocaleString()}</td>
                  <td style="color:var(--text-dim)">${t.challenges_solved}/${state.challenges.length}</td>
                  <td style="color:var(--text-muted);font-size:12px">${formatTime(t.last_solve)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      `;
    }

    // ═══════════════════════════════════════════════════════
    //  ADMIN VIEW
    // ═══════════════════════════════════════════════════════
    function renderAdmin() {
      const categories = ['Web', 'Crypto', 'Forensics', 'Pwn', 'Reversing',
        'RECON', 'INTRUSION', 'SIGINT', 'PRIVESC', 'PERSISTENCE', 'CRYPTO'];

      return `
        <div class="section-header">
          <span class="section-title">Panel de Administración</span>
          <button class="btn-danger" onclick="resetAllData()">⚠ Reiniciar Competición</button>
        </div>

        <div class="admin-section">
          <div class="admin-section-head">
            <h3>Crear Reto</h3>
          </div>
          <div class="admin-body">
            <form id="create-challenge-form">
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">Título</label>
                  <input class="form-input" name="title" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Categoría</label>
                  <select class="form-select" name="category" required>
                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Puntos</label>
                  <select class="form-select" name="points" required>
                    <option value="100">100</option>
                    <option value="300">300</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Flag</label>
                  <input class="form-input" name="flag" placeholder="MARSEC{...}" required>
                </div>
                <div class="form-group full">
                  <label class="form-label">Descripción</label>
                  <textarea class="form-textarea" name="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label">Pista 1</label>
                  <input class="form-input" name="hint1">
                </div>
                <div class="form-group">
                  <label class="form-label">Pista 2</label>
                  <input class="form-input" name="hint2">
                </div>
                <div class="form-group full">
                  <label class="form-label">Pista 3</label>
                  <input class="form-input" name="hint3">
                </div>
              </div>
              <button type="submit" class="btn-primary" style="margin-top:1rem;max-width:240px">CREAR RETO</button>
            </form>
          </div>
        </div>

        <div class="admin-section">
          <div class="admin-section-head">
            <h3>Retos (${state.adminChallenges.length})</h3>
          </div>
          <div class="admin-body" style="padding:0">
            <table class="admin-table">
              <thead><tr><th>Título</th><th>Categoría</th><th>Puntos</th><th>Flag</th><th>Acciones</th></tr></thead>
              <tbody>
                ${state.adminChallenges.map(c => `
                  <tr>
                    <td style="font-weight:600">${escHtml(c.title)}</td>
                    <td><span class="ch-cat ${getCatMeta(c.category).class}" style="font-size:8px">${c.category}</span></td>
                    <td>${c.points}</td>
                    <td style="color:var(--text-muted);font-size:11px">${c.hasFlag ? (c.isSecure ? '🔒 Hash' : '⚠ Texto') : '❌ Sin flag'}</td>
                    <td>
                      <button class="btn-sm danger" onclick="deleteChallenge('${c.id}')">Eliminar</button>
                    </td>
                  </tr>
                `).join('')}
                ${state.adminChallenges.length === 0 ? '<tr><td colspan="5" class="empty-state">Sin retos</td></tr>' : ''}
              </tbody>
            </table>
          </div>
        </div>

        <div class="admin-section">
          <div class="admin-section-head">
            <h3>Equipos (${state.adminTeams.length})</h3>
          </div>
          <div class="admin-body" style="padding:0">
            <table class="admin-table">
              <thead><tr><th>Nombre</th><th>Puntos</th><th>Retos</th><th>Registrado</th><th>Acciones</th></tr></thead>
              <tbody>
                ${state.adminTeams.map(t => `
                  <tr>
                    <td style="font-weight:600">${escHtml(t.name)}</td>
                    <td class="points-cell">${t.total_points}</td>
                    <td>${t.challenges_solved}</td>
                    <td style="color:var(--text-muted);font-size:11px">${formatTime(t.created_at)}</td>
                    <td>
                      <button class="btn-sm danger" onclick="deleteTeam('${t.id}')">Eliminar</button>
                    </td>
                  </tr>
                `).join('')}
                ${state.adminTeams.length === 0 ? '<tr><td colspan="5" class="empty-state">Sin equipos</td></tr>' : ''}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════════════════
    //  MODALS
    // ═══════════════════════════════════════════════════════
    function showModal(content) {
      closeModal();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeModal()">&times;</button>
          ${content}
        </div>
      `;
      overlay.addEventListener('click', closeModal);
      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('active'));
    }

    function closeModal() {
      const overlay = document.querySelector('.modal-overlay');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => overlay.remove(), 300);
      }
      state.modalChallenge = null;
    }

    function showAdminLoginModal() {
      const content = `
        <div style="text-align:center;margin-bottom:1.5rem">
          <span style="font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--text-dim)">ACCESO ADMINISTRADOR</span>
        </div>
        <form id="admin-login-form">
          <div class="form-group">
            <label class="form-label">Usuario</label>
            <input class="form-input" id="admin-user" required autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input class="form-input" type="password" id="admin-pass" required>
          </div>
          <button type="submit" class="btn-primary">ENTRAR</button>
          <div class="auth-error" id="admin-error"></div>
        </form>
      `;
      showModal(content);

      setTimeout(() => {
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const result = await api.post('/api/admin/login', {
            username: document.getElementById('admin-user').value,
            password: document.getElementById('admin-pass').value,
          });
          if (result.error) {
            const err = document.getElementById('admin-error');
            err.textContent = result.error;
            err.classList.add('show');
          } else {
            state.user = 'Admin';
            state.isAdmin = true;
            closeModal();
            await loadAdminData();
            navigate('admin');
          }
        });
      }, 100);
    }

    // ═══════════════════════════════════════════════════════
    //  ACTIONS
    // ═══════════════════════════════════════════════════════
    async function navigate(page) {
      state.page = page;
      if (page === 'scoreboard') await loadScoreboard();
      if (page === 'admin') await loadAdminData();
      if (page === 'challenges') await loadChallenges();
      render();
    }

    function filterCat(cat) {
      state.selectedCat = cat;
      render();
    }

    async function logout() {
      await api.post('/api/logout');
      state.user = null; state.teamId = null; state.isAdmin = false;
      state.page = 'challenges'; state.challenges = []; state.scoreboard = [];
      render();
    }

    async function loadChallenges() {
      try {
        state.challenges = await api.get('/api/challenges');
        // Also quietly load scoreboard for rank display
        state.scoreboard = await api.get('/api/scoreboard');
      } catch (e) { console.error(e); }
    }

    async function loadScoreboard() {
      try {
        state.scoreboard = await api.get('/api/scoreboard');
      } catch (e) { console.error(e); }
    }

    async function loadAdminData() {
      try {
        state.adminChallenges = await api.get('/api/admin/challenges');
        state.adminTeams = await api.get('/api/admin/teams');
      } catch (e) { console.error(e); }
    }

    async function submitFlag(challengeId) {
      const input = document.getElementById('modal-flag');
      const errorEl = document.getElementById('modal-flag-error');
      const successEl = document.getElementById('modal-flag-success');
      if (!input) return;

      const flag = input.value.trim();
      if (!flag) {
        errorEl.textContent = '✕ Introduce una flag';
        errorEl.classList.add('show');
        input.classList.add('error');
        return;
      }

      errorEl.classList.remove('show');
      successEl.classList.remove('show');
      input.classList.remove('error');

      const result = await api.post('/api/submit', { challengeId, flag });

      if (result.correct) {
        successEl.textContent = `✓ ¡Correcto! +${result.pointsAwarded} puntos`;
        successEl.classList.add('show');
        toast(`¡Flag correcta! +${result.pointsAwarded} pts`);
        await loadChallenges();
        setTimeout(() => { closeModal(); render(); }, 1200);
      } else {
        errorEl.textContent = `✕ ${result.error || result.message || 'Flag incorrecta'}`;
        errorEl.classList.add('show');
        input.classList.add('error');
        input.style.animation = 'shake 0.4s ease';
        setTimeout(() => input.style.animation = '', 400);
      }
    }

    async function unlockHint(challengeId, hintNumber) {
      const ch = state.challenges.find(c => c.id === challengeId);
      if (!ch) return;
      const newPts = calcPoints(ch.points, hintNumber);

      if (!confirm(`¿Desbloquear pista ${hintNumber}? Puntos máximos: ${newPts}`)) return;

      const result = await api.post('/api/hint', { challengeId, hintNumber });

      if (result.error) {
        toast(result.error, 'error');
      } else {
        toast(`Pista desbloqueada — Máximo: ${result.newMaxPoints} pts`);
        await loadChallenges();
        openChallenge(challengeId);
      }
    }

    async function showTeamHistory(teamId, teamName) {
      const subs = await api.get(`/api/submissions/${teamId}`);
      const content = `
        <div style="margin-bottom:1rem">
          <span style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim)">HISTORIAL</span>
          <div class="modal-title">${escHtml(teamName)}</div>
        </div>
        ${subs.length === 0 ? '<div class="empty-state">Sin flags resueltas</div>' :
          subs.map(s => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
              <div>
                <div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)">${escHtml(s.challenge_title)}</div>
                <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">${formatTime(s.submitted_at)}</div>
              </div>
              <span style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green)">+${s.points_awarded}</span>
            </div>
          `).join('')
        }
      `;
      showModal(content);
    }

    async function deleteChallenge(id) {
      if (!confirm('¿Eliminar este reto?')) return;
      await api.del(`/api/admin/challenges/${id}`);
      toast('Reto eliminado');
      await loadAdminData();
      render();
    }

    async function deleteTeam(id) {
      if (!confirm('¿Eliminar este equipo y su progreso?')) return;
      await api.del(`/api/admin/teams/${id}`);
      toast('Equipo eliminado');
      await loadAdminData();
      render();
    }

    async function resetAllData() {
      if (!confirm('⚠ Se borrarán TODOS los equipos y progreso. Los retos se mantienen. ¿Continuar?')) return;
      if (!confirm('Esta acción NO se puede deshacer. ¿Completamente seguro?')) return;
      await api.post('/api/admin/reset');
      toast('Competición reiniciada');
      await loadAdminData();
      render();
    }

    function bindPage() {
      // Admin create form
      const createForm = document.getElementById('create-challenge-form');
      if (createForm) {
        createForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const f = createForm;
          const data = {
            title: f.title.value,
            description: f.description.value,
            category: f.category.value,
            points: parseInt(f.points.value),
            flag: f.flag.value,
            hint1: f.hint1?.value || null,
            hint2: f.hint2?.value || null,
            hint3: f.hint3?.value || null,
          };
          const result = await api.post('/api/admin/challenges', data);
          if (result.success) {
            toast('Reto creado');
            f.reset();
            await loadAdminData();
            render();
          } else {
            toast(result.error || 'Error', 'error');
          }
        });
      }
    }

    // ═══════════════════════════════════════════════════════
    //  UTILITIES
    // ═══════════════════════════════════════════════════════
    function escHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escAttr(str) {
      return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function formatTime(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleString('es-ES', {
        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit',
      });
    }

    // ═══════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════
    async function init() {
      try {
        const me = await api.get('/api/me');
        if (me.authenticated) {
          state.user = me.teamName;
          state.teamId = me.teamId;
          state.isAdmin = me.isAdmin;
          await loadChallenges();
        }
      } catch (e) {
        console.error('Init error:', e);
      }
      render();

      // Auto-refresh scoreboard
      setInterval(() => {
        if (state.page === 'scoreboard' && state.user) loadScoreboard().then(render);
      }, 30000);
    }

    init();
  </script>
</body>
</html>
